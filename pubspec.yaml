name: book_my_fit_vendor
description: BookMyFit Vendor App - Gym Management Made Easy

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  path_provider: ^2.1.2

  webview_flutter: ^4.4.2
  gal: ^2.3.0
  url_launcher: ^6.2.4
  
  # State Management
  provider: ^6.1.1

  # Network & API
  http: ^1.1.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Google Fonts
  google_fonts: ^6.1.0

  # Maps (OpenStreetMap)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^11.0.0

  # Image Picker
  image_picker: ^1.0.7
  
  # File Picker
  file_picker: ^8.0.0

  # Cached Network Image
  cached_network_image: ^3.3.1

  # QR Code
  qr_flutter: ^4.1.0
  
  # QR Code Scanning
  mobile_scanner: ^5.0.0

  # Intl for date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

  assets:
    - assets/images/
  #   - assets/icons/
